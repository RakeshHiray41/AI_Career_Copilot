{% extends "base.html" %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">

        <h2>Welcome Back</h2>

        <p class="sub-text">
            Login to access your account
        </p>

        {% if error %}
            <p style="color:red;">
                {{ error }}
            </p>
        {% endif %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <a href="/forgot-password">
            Forgot Password?
        </a>

        <p class="switch-auth">
            Don't have an account?
            <a href="/signup">Signup</a>
        </p>

    </div>
</div>

{% endblock %}
